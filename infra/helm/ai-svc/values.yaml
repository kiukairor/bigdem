replicaCount: 1

image:
  repository: ghcr.io/kiukairor/ai-svc
  pullPolicy: IfNotPresent
  tag: "sha-c257052"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8082

ingress:
  enabled: false

env:
  NEW_RELIC_APP_NAME: "pulse-ai-svc"
  PORT: "8082"
  DEMO_CITY: "London"
  CB_FAILURE_THRESHOLD: "5"
  CB_RECOVERY_TIMEOUT_SECONDS: "60"
  AI_PROVIDER: "gemini"
  GEMINI_MODEL: "gemini-3.1-flash-lite-preview"
  # Bug scenario toggles — set to "true" to activate, "false" to deactivate
  BUG_AI_SLOW: "false"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

secrets:
  newrelic: newrelic-secret
  postgres: postgres-secret
  redis: redis-secret
  anthropic: anthropic-secret
  gemini: gemini-secret
  app: app-secret
