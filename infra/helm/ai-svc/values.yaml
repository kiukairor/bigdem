replicaCount: 1

image:
  repository: ghcr.io/kiukairor/ai-svc
  pullPolicy: IfNotPresent
  tag: "sha-d7d92a7"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8082

ingress:
  enabled: false

env:
  NEW_RELIC_APP_NAME: "pulse-ai-svc"
  NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: "true"
  NEW_RELIC_APPLICATION_LOGGING_ENABLED: "true"
  NEW_RELIC_APPLICATION_LOGGING_FORWARDING_ENABLED: "true"
  NEW_RELIC_AI_MONITORING_ENABLED: "true"
  NEW_RELIC_AI_MONITORING_STREAMING_ENABLED: "true"
  NEW_RELIC_AI_MONITORING_RECORD_CONTENT_ENABLED: "true"
  NEW_RELIC_SPAN_EVENTS_MAX_SAMPLES_STORED: "10000"
  PORT: "8082"
  DEMO_CITY: "London"
  CB_FAILURE_THRESHOLD: "5"
  CB_RECOVERY_TIMEOUT_SECONDS: "60"
  AI_PROVIDER: "gemini"
  GEMINI_MODEL: "gemini-3.1-flash-lite-preview"
  OPENAI_MODEL: "gpt-4o-mini"
  EVENT_SVC_URL: "http://event-svc:8080"
  SESSION_SVC_URL: "http://session-svc:8081"
  # Bug scenario toggles — set to "true" to activate, "false" to deactivate
  BUG_AI_SLOW: "false"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

secrets:
  newrelic: newrelic-secret
  postgres: postgres-secret
  redis: redis-secret
  anthropic: anthropic-secret
  gemini: gemini-secret
  openai: openai-secret
  eventbrite: eventbrite-secret
  ticketmaster: ticketmaster-secret
  app: app-secret
