replicaCount: 1

image:
  repository: ghcr.io/kiukairor/event-svc
  pullPolicy: IfNotPresent
  tag: "sha-02489b4"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false

env:
  NEW_RELIC_APP_NAME: "pulse-event-svc"
  PORT: "8080"
  DEMO_CITY: "London"
  DEMO_USER_ID: "demo_user"
  DEMO_USER_NAME: "Demo User"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

secrets:
  newrelic: newrelic-secret
  postgres: postgres-secret
  redis: redis-secret
  anthropic: anthropic-secret
  app: app-secret
