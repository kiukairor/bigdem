replicaCount: 2

image:
  repository: ghcr.io/kiukairor/pulse-ai-dontask
  pullPolicy: IfNotPresent
  tag: "sha-eb7cee6"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8090

env:
  PORT: "8090"
  GEMINI_MODEL: "gemini-3.1-flash-lite-preview"
  EVENT_SVC_URL: "http://event-svc:8080"
  BUG_AI_SLOW: "false"
  BUG_AI_BAD_KEY: "true"
  NEW_RELIC_APP_NAME: "pulse-ai-dontask"
  NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: "true"
  NEW_RELIC_APPLICATION_LOGGING_ENABLED: "true"
  NEW_RELIC_APPLICATION_LOGGING_FORWARDING_ENABLED: "true"
  NEW_RELIC_AI_MONITORING_ENABLED: "true"
  NEW_RELIC_AI_MONITORING_STREAMING_ENABLED: "true"
  NEW_RELIC_AI_MONITORING_RECORD_CONTENT_ENABLED: "true"
  NEW_RELIC_SPAN_EVENTS_MAX_SAMPLES_STORED: "10000"

resources:
  requests:
    memory: "256Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "200m"

secrets:
  gemini: gemini-secret
  newrelic: newrelic-secret
  anthropic: anthropic-secret
  openai: openai-secret
