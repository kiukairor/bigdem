replicaCount: 1

image:
  repository: ghcr.io/kiukairor/session-svc
  pullPolicy: IfNotPresent
  tag: "sha-323fc9c"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false

env:
  NEW_RELIC_APP_NAME: "pulse-session-svc"
  PORT: "8081"
  # Bug scenario toggles — set to "true" to activate, "false" to deactivate
  BUG_MEMORY_LEAK: "false"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

secrets:
  newrelic: newrelic-secret
  postgres: postgres-secret
  redis: redis-secret
  anthropic: anthropic-secret
  app: app-secret
