apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        newrelic.io/scrape: "true"
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.newrelic }}
                  key: license-key
            - name: NEW_RELIC_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.newrelic }}
                  key: account-id
            - name: NEW_RELIC_BROWSER_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.newrelic }}
                  key: browser-license-key
                  optional: true
            - name: NEW_RELIC_BROWSER_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.newrelic }}
                  key: browser-app-id-shell
                  optional: true
            - name: NEW_RELIC_BROWSER_TRUST_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.newrelic }}
                  key: browser-trust-key
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
