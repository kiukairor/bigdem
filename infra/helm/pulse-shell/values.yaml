replicaCount: 1

image:
  repository: ghcr.io/kiukairor/pulse-shell
  pullPolicy: IfNotPresent
  tag: "sha-8ee9073"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: pulse.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  NEW_RELIC_APP_NAME: "pulse-pulse-shell"
  PORT: "3000"
  NEXT_PUBLIC_FEED_MFE_URL: "http://pulse-feed:3001"
  NEXT_PUBLIC_PROFILE_MFE_URL: "http://pulse-profile:3002"
  NEXT_PUBLIC_EVENT_SVC_URL: "http://event-svc:8080"
  NEXT_PUBLIC_AI_SVC_URL: "http://ai-svc:8082"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

secrets:
  newrelic: newrelic-secret
  postgres: postgres-secret
  redis: redis-secret
  anthropic: anthropic-secret
  app: app-secret
