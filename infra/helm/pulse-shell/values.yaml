replicaCount: 1

image:
  repository: ghcr.io/kiukairor/pulse-shell
  pullPolicy: IfNotPresent
  tag: "sha-1b5ecad"

imagePullSecrets:
  - name: ghcr-secret

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false

env:
  NEW_RELIC_APP_NAME: "pulse-shell"
  HOSTNAME: "0.0.0.0"
  PORT: "3000"
  # NEXT_PUBLIC_* vars are baked into the image at CI build time (Docker build-args).
  # They cannot be overridden here at runtime. To change public URLs, update
  # build-args in .github/workflows/pulse-shell.yml and push to trigger a rebuild.

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "500m"

secrets:
  newrelic: newrelic-secret
  postgres: postgres-secret
  redis: redis-secret
  anthropic: anthropic-secret
  app: app-secret
