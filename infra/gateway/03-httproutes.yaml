# HTTPRoutes for PULSE services
# All routes live in pulse-prod namespace and bind to the nginx-gateway
# in the nginx-gateway namespace (allowed via listener allowedRoutes.namespaces.from: All).
#
# Host-based routing:
#   pulse.test             → pulse-shell:3000  (app shell)
#   feed.pulse.test        → pulse-feed:3001   (MFE remote)
#   event.pulse.test       → event-svc:8080    (events API)
#   ai.pulse.test          → ai-svc:8082       (AI recommendations API)
#   session.pulse.test     → session-svc:8081  (session API)
#
# /etc/hosts on your local machine:
#   <PI_IP>  pulse.test feed.pulse.test event.pulse.test ai.pulse.test session.pulse.test
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-shell
  namespace: pulse-prod
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: https
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - "pulse.test"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: pulse-shell
      port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-feed
  namespace: pulse-prod
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: https
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - "feed.pulse.test"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: pulse-feed
      port: 3001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: event-svc
  namespace: pulse-prod
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: https
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - "event.pulse.test"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: event-svc
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-svc
  namespace: pulse-prod
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: https
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - "ai.pulse.test"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: ai-svc
      port: 8082
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: session-svc
