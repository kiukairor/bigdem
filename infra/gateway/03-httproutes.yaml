# HTTPRoutes for PULSE
# Only pulse-shell is exposed externally. It proxies MFE remotes and
# backend APIs server-side via next.config.js rewrites, so the browser
# stays on pulse.test:30443 for everything.
#
# /etc/hosts on your local machine:
#   <PI_IP>  pulse.test
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pulse-shell
  namespace: pulse-prod
spec:
  parentRefs:
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: https
  - name: nginx-gateway
    namespace: nginx-gateway
    sectionName: http
  hostnames:
  - "pulse.test"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: pulse-shell
      port: 3000
