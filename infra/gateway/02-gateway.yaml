apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: nginx-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    allowedRoutes:
      namespaces:
        from: All
    port: 80
    protocol: HTTP
  - name: https
    allowedRoutes:
      namespaces:
        from: All
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - name: nginx-gw-fabric-tls
