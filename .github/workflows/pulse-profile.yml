name: Build and Deploy — pulse-profile

on:
  push:
    branches: [main]
    paths:
      - 'frontends/pulse-profile/**'
      - '.github/workflows/pulse-profile.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontends/pulse-profile/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pulse-profile

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontends/pulse-profile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_EVENT_SVC_URL=https://pulse.test:30443/api/event-svc
            NEXT_PUBLIC_SESSION_SVC_URL=https://pulse.test:30443/api/session-svc
            NEXT_PUBLIC_NR_BROWSER_LICENSE_KEY=NRJS-62af62d01efc06e84ee
            NEXT_PUBLIC_NR_BROWSER_APP_ID=538847159
            NEXT_PUBLIC_NR_BROWSER_ACCOUNT_ID=7697931
            NEXT_PUBLIC_NR_BROWSER_TRUST_KEY=7697931

  update-image-tag:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm values with new image tag
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s/tag: .*/tag: \"${SHA_TAG}\"/" infra/helm/pulse-profile/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/pulse-profile/values.yaml
          git commit -m "ci: update pulse-profile image tag to ${SHA_TAG} [skip ci]"
          git pull --rebase origin main
          git push
